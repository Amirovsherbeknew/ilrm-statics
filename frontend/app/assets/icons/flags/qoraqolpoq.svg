<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Ko'k chiziq -->
  <rect width="1200" height="200" fill="#0099CC"/>
  <!-- Oq chiziq -->
  <rect y="200" width="1200" height="200" fill="white"/>
  <!-- Yashil chiziq -->
  <rect y="400" width="1200" height="200" fill="#1EB53A"/>
  <!-- Qizil chiziq -->
  <rect y="380" width="1200" height="20" fill="red"/>
  <!-- Oq yulduz va yarim oy -->
  <circle cx="100" cy="100" r="50" fill="white"/>
  <circle cx="120" cy="100" r="50" fill="#0099CC"/>
  <circle cx="100" cy="100" r="45" fill="white"/>
  <!-- Yulduzlar -->
  <g fill="white">
    <polygon points="80,45 90,75 120,75 95,90 105,120 80,100 55,120 65,90 40,75 70,75"/>
    <polygon points="160,45 170,75 200,75 175,90 185,120 160,100 135,120 145,90 120,75 150,75"/>
  </g>
</svg>
